<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Carrello - DivaniSpecial</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f3e7d3;
color:#4b382a;
}

.container{
display:flex;
}

.sidebar{
width:220px;
min-height:100vh;
background:#5c4332;
padding:30px;
border-right:4px solid #d4af37;
}

.logo{
font-size:30px;
font-weight:bold;
color:#d4af37;
margin-bottom:40px;
}

.sidebar a{
display:block;
margin:25px 0;
text-decoration:none;
color:white;
}

.center{
flex:2;
padding:40px;
animation:fadeIn 1s ease;
}

.center h1{
margin-bottom:30px;
}

.item{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.right{
width:320px;
background:#e7d8bf;
padding:40px;
}

.right h2{
margin-bottom:20px;
}

.right h3{
margin-bottom:30px;
}

button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#f1c84c;
transform:translateY(-3px);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){
window.location.href = "registrazioneEcommerce.html";
}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">DivaniSpecial</div>

<a href="registrazioneEcommerce.html">Registrazione</a>
<a href="loginEcommerce.html">Login</a>
<a href="vetrinaEcommerce.html">Vetrina</a>
<a href="carrelloEcommerce.html">Carrello</a>

</div>

<div class="center">

<h1>Il tuo Carrello</h1>

<div id="lista"></div>

</div>

<div class="right">

<h2>Riepilogo Ordine</h2>

<h3 id="totale">Totale: € 0</h3>

<button onclick="generaPDF()">
Scarica Ricevuta PDF
</button>

</div>

</div>

<script>

let carrello = JSON.parse(localStorage.getItem("carrello")) || [];

let totale = 0;

carrello.forEach(prodotto => {

totale += Number(prodotto.prezzo);

document.getElementById("lista").innerHTML += `

<div class="item">

<h2>${prodotto.nome}</h2>

<p>Prezzo: € ${prodotto.prezzo}</p>

</div>

`;

});

document.getElementById("totale").innerText =
"Totale: € " + totale;

function generaPDF(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF();

let utente = JSON.parse(localStorage.getItem("utente"));

doc.setFont("courier");

doc.text("DIVANISPECIAL", 20, 20);

doc.text("Ricevuta Acquisto", 20, 35);

doc.text("Cliente: " + utente.nome, 20, 50);

doc.text("Data: " + new Date().toLocaleDateString(), 20, 65);

let y = 90;

carrello.forEach(p => {

doc.text(
p.nome + " - € " + p.prezzo,
20,
y
);

y += 12;

});

doc.text("Totale Finale: € " + totale, 20, y + 20);

doc.save("ricevuta_divani.pdf");

}

</script>

</body>
</html>
