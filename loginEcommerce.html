<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DivaniSpecial</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3e7d3;
height:100vh;
overflow:hidden;
color:#4b382a;
}

.container{
display:flex;
height:100vh;
animation:fadeIn 1s ease;
}

.sidebar{
width:220px;
background:#5c4332;
padding:30px;
border-right:4px solid #d4af37;
}

.logo{
font-size:30px;
font-weight:bold;
color:#d4af37;
margin-bottom:40px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:25px 0;
}

.sidebar a{
text-decoration:none;
color:white;
transition:0.3s;
}

.sidebar a:hover{
color:#d4af37;
padding-left:10px;
}

.center{
width:35%;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.form-box{
width:100%;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.form-box h2{
margin-bottom:25px;
color:#5c4332;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#f0ece6;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#d4af37;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
background:#f1c84c;
}

.right{
flex:1;
padding:60px;
display:flex;
justify-content:center;
flex-direction:column;
}

.right h1{
font-size:42px;
margin-bottom:20px;
color:#5c4332;
}

.right ul{
line-height:2.2;
font-size:18px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">DivaniSpecial</div>

<ul>
<li><a href="registrazioneEcommerce.html">Registrazione</a></li>
<li><a href="loginEcommerce.html">Login</a></li>
<li><a href="vetrinaEcommerce.html">Vetrina</a></li>
<li><a href="carrelloEcommerce.html">Carrello</a></li>
</ul>

</div>

<div class="center">

<div class="form-box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Accedi</button>

</div>

</div>

<div class="right">

<h1>Area Clienti DivaniSpecial</h1>

<ul>
<li>✔ Accesso alle offerte premium</li>
<li>✔ Sconti esclusivi sui divani</li>
<li>✔ Spedizioni rapide</li>
<li>✔ Assistenza personalizzata</li>
<li>✔ Nuove collezioni in anteprima</li>
</ul>

</div>

</div>

<script>

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let utente = JSON.parse(localStorage.getItem("utente"));

if(utente && utente.email === email && utente.password === password){

localStorage.setItem("isLoggedIn", true);

window.location.href = "vetrinaEcommerce.html";

}else{

alert("Credenziali errate");

}

}

</script>

</body>
</html>
