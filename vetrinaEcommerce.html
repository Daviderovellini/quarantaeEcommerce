<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Vetrina - VelvetNest Living</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:#f5efe6;
color:#3d2f25;
}

.container{
display:flex;
min-height:100vh;
}

.sidebar{
width:240px;
background:#3d2f25;
padding:40px;
}

.logo{
font-size:30px;
font-weight:600;
color:#d6c2a8;
margin-bottom:50px;
}

.sidebar a{
display:block;
margin:25px 0;
text-decoration:none;
color:white;
transition:0.3s;
}

.sidebar a:hover{
padding-left:10px;
color:#d6c2a8;
}

.content{
flex:1;
padding:50px;
animation:fadeUp 1s ease;
}

.content h1{
font-size:42px;
margin-bottom:40px;
color:#7a5c45;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:35px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:25px;
}

.card-content h2{
margin-bottom:10px;
color:#7a5c45;
}

.card-content h3{
margin-bottom:15px;
font-weight:400;
}

.card-content p{
margin:10px 0;
line-height:1.6;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#7a5c45;
color:white;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
background:#5e4634;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){
window.location.href = "registrazioneEcommerce.html";
}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">VelvetNest</div>

<a href="registrazioneEcommerce.html">Registrazione</a>
<a href="loginEcommerce.html">Login</a>
<a href="vetrinaEcommerce.html">Vetrina</a>
<a href="carrelloEcommerce.html">
Carrello (<span id="counter">0</span>)
</a>

</div>

<div class="content">

<h1>I Nostri Divani</h1>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

let carrello = JSON.parse(localStorage.getItem("carrello")) || [];

aggiornaCounter();

fetch("prodotti.csv")
.then(response => response.text())
.then(data => {

let righe = data.split("\n");

righe.shift();

righe.forEach(riga => {

let colonne = riga.split(",");

let nome = colonne[0];
let marca = colonne[1];
let descrizione = colonne[2];
let immagine = colonne[3];
let prezzo = colonne[4];
let dimensioni = colonne[5];
let colore = colonne[6];
let spedizione = colonne[7];

let card = document.createElement("div");

card.classList.add("card");

card.innerHTML = `

<img src="${immagine}">

<div class="card-content">

<h2>${nome}</h2>
<h3>${marca}</h3>

<p>${descrizione}</p>

<p><b>Dimensioni:</b> ${dimensioni}</p>
<p><b>Colore:</b> ${colore}</p>
<p><b>Spedizione:</b> ${spedizione}</p>

<p><b>Prezzo:</b> € ${prezzo}</p>

<button onclick='aggiungiCarrello(${JSON.stringify({
nome,
prezzo
})})'>
Aggiungi al carrello
</button>

</div>

`;

document.getElementById("grid").appendChild(card);

});

});

function aggiungiCarrello(prodotto){

carrello.push(prodotto);

localStorage.setItem("carrello", JSON.stringify(carrello));

aggiornaCounter();

alert("Divano aggiunto al carrello!");

}

function aggiornaCounter(){

document.getElementById("counter").innerText = carrello.length;

}

</script>

</body>
</html>
