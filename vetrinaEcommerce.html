<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Vetrina - DivaniSpecial</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3e7d3;
color:#4b382a;
}

.container{
display:flex;
}

.sidebar{
width:220px;
min-height:100vh;
background:#5c4332;
padding:30px;
border-right:4px solid #d4af37;
}

.logo{
font-size:30px;
font-weight:bold;
color:#d4af37;
margin-bottom:40px;
}

.sidebar a{
display:block;
margin:25px 0;
text-decoration:none;
color:white;
transition:0.3s;
}

.sidebar a:hover{
padding-left:10px;
color:#d4af37;
}

.content{
flex:1;
padding:40px;
animation:fadeIn 1s ease;
}

.content h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card-content p{
margin:10px 0;
}

button{
width:100%;
padding:14px;
background:#d4af37;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#f1c84c;
transform:translateY(-3px);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){
window.location.href = "registrazioneEcommerce.html";
}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">DivaniSpecial</div>

<a href="registrazioneEcommerce.html">Registrazione</a>
<a href="loginEcommerce.html">Login</a>
<a href="vetrinaEcommerce.html">Vetrina</a>

<a href="carrelloEcommerce.html">
Carrello (<span id="counter">0</span>)
</a>

</div>

<div class="content">

<h1>I Nostri Divani</h1>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

let carrello = JSON.parse(localStorage.getItem("carrello")) || [];

aggiornaCounter();

fetch("prodotti.csv")
.then(response => response.text())
.then(data => {

let righe = data.split("\n");

righe.shift();

righe.forEach(riga => {

let colonne = riga.split(",");

let nome = colonne[0];
let marca = colonne[1];
let descrizione = colonne[2];
let immagine = colonne[3];
let prezzo = colonne[4];
let dimensioni = colonne[5];
let taglia = colonne[6];
let spedizione = colonne[7];

let card = document.createElement("div");

card.classList.add("card");

card.innerHTML = `

<img src="${immagine}">

<div class="card-content">

<h2>${nome}</h2>

<h3>${marca}</h3>

<p>${descrizione}</p>

<p><b>Dimensioni:</b> ${dimensioni}</p>

<p><b>Taglia:</b> ${taglia}</p>

<p><b>Spedizione:</b> ${spedizione}</p>

<p><b>Prezzo:</b> € ${prezzo}</p>

<button onclick='aggiungiCarrello(${JSON.stringify({
nome,
prezzo
})})'>
Aggiungi al carrello
</button>

</div>

`;

document.getElementById("grid").appendChild(card);

});

});

function aggiungiCarrello(prodotto){

carrello.push(prodotto);

localStorage.setItem("carrello", JSON.stringify(carrello));

aggiornaCounter();

alert("Divano aggiunto al carrello!");

}

function aggiornaCounter(){

document.getElementById("counter").innerText = carrello.length;

}

</script>

</body>
</html>
